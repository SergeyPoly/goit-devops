controller:
  componentName: "jenkins-controller"
  image:
    registry: "docker.io"
    repository: "jenkins/jenkins"
    tag: "2.504.1-jdk17"
  serviceType: LoadBalancer
  resources:
    requests:
      cpu: "500m"
      memory: "512Mi"
    limits:
      cpu: "2000m"
      memory: "2048Mi"
  # Дефолтний список чарту (helm show values jenkins/jenkins) із оновленою
  # версією configuration-as-code: git 5.7.0 (через git-client 6.4.3) вимагає
  # новішу за ту, що зафіксована в чарті за замовчуванням.
  installPlugins:
    - kubernetes
    - workflow-aggregator:600.vb_57cdd26fdd7
    - git:5.7.0
    - configuration-as-code:1985.vdda_32d0c4ea_b_
  probes:
    startupProbe:
      httpGet:
        path: '{{ default "" .Values.controller.jenkinsUriPrefix }}/login'
        port: http
      failureThreshold: 60
      periodSeconds: 10
      timeoutSeconds: 5

agent:
  enabled: true
  resources:
    requests:
      cpu: "500m"
      memory: "256Mi"
    limits:
      cpu: "1000m"
      memory: "512Mi"

testEngine:
  active: false