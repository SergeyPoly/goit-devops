apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-web
  labels:
    app: {{ .Release.Name }}-web
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: {{ .Release.Name }}-web
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}-web
    spec:
      containers:
          - name: django
            image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
            imagePullPolicy: {{ .Values.image.pullPolicy }}
            ports:
              - containerPort: 8000
            resources:
              limits:
                cpu: 500m
                memory: 512Mi
              requests:
                cpu: 200m
                memory: 256Mi
            # /admin/ використаний як health-check: власного /healthz у
            # застосунку немає, а /admin/ повертає 2xx/3xx одразу після
            # старту Django без потреби в автентифікації.
            livenessProbe:
              httpGet:
                path: /admin/
                port: 8000
              initialDelaySeconds: 15
              periodSeconds: 20
              timeoutSeconds: 5
              failureThreshold: 3
            readinessProbe:
              httpGet:
                path: /admin/
                port: 8000
              initialDelaySeconds: 5
              periodSeconds: 10
              timeoutSeconds: 5
              failureThreshold: 3
            envFrom:
              - configMapRef:
                  name: "{{ .Release.Name }}-config"
              - secretRef:
                  name: "{{ .Release.Name }}-secret"